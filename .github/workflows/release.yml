name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # create GitHub releases
  packages: write        # push to GHCR
  id-token: write        # keyless cosign signing via OIDC
  attestations: write    # actions/attest-build-provenance

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  build-push:
    name: Build & push multi-arch Docker image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push (amd64 + arm64)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/cvemula1/tif:${{ github.ref_name }}
            ghcr.io/cvemula1/tif:latest
            docker.io/chvemula/tif:${{ github.ref_name }}
            docker.io/chvemula/tif:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sign-sbom-provenance:
    name: Sign image + attach SBOM + SLSA provenance
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sign GHCR image (keyless via GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/cvemula1/tif@${{ needs.build-push.outputs.digest }}

      - name: Resolve Docker Hub digest
        id: dockerhub-digest
        run: |
          DIGEST="sha256:$(docker buildx imagetools inspect --raw docker.io/chvemula/tif:${{ github.ref_name }} | sha256sum | cut -d' ' -f1)"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign Docker Hub image (keyless via GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            docker.io/chvemula/tif@${{ steps.dockerhub-digest.outputs.digest }}

      - name: Generate SBOM
        run: |
          syft ghcr.io/cvemula1/tif:${{ github.ref_name }} \
            -o spdx-json \
            > sbom.spdx.json

      - name: Attach SBOM to GHCR image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdx \
            ghcr.io/cvemula1/tif@${{ needs.build-push.outputs.digest }}

      - name: Attach SBOM to Docker Hub image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdx \
            docker.io/chvemula/tif@${{ steps.dockerhub-digest.outputs.digest }}

      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/cvemula1/tif
          subject-digest: ${{ needs.build-push.outputs.digest }}

  # publish-pypi:
  #   name: Publish to PyPI
  #   runs-on: ubuntu-latest
  #   needs: test
  #   environment: pypi
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: "3.12"
  #     - name: Build distribution
  #       run: |
  #         pip install build
  #         python -m build
  #     - name: Publish to PyPI
  #       uses: pypa/gh-action-pypi-publish@release/v1
  #       with:
  #         password: ${{ secrets.PYPI_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [sign-sbom-provenance]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            docker run --rm ghcr.io/cvemula1/tif:${{ github.ref_name }} verify IMAGE --only-fixable
            ```

            ## Verify this release

            ```bash
            cosign verify \
              --certificate-identity=https://github.com/cvemula1/tif/.github/workflows/release.yml@refs/tags/${{ github.ref_name }} \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
              ghcr.io/cvemula1/tif:${{ github.ref_name }}
            ```
